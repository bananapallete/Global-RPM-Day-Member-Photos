<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2026 Global RPM Day · 구성원 사진</title>
  <meta name="description" content="2026 Global RPM Day 구성원 AI 사진 다운로드" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📸</text></svg>" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <p class="eyebrow">2026 GLOBAL RPM DAY</p>
    <h1 class="site-title">구성원 사진</h1>
    <p class="site-sub">Member Photo Gallery — 사업부를 선택하면 구성원 카드가 나타납니다</p>
  </header>

  <main id="app">
    <!-- 홈: 사업부 버튼 -->
    <section id="home" hidden></section>

    <!-- 팀 상세: 구성원 카드 -->
    <section id="team-view" hidden>
      <div class="team-head">
        <button id="back-btn" class="back-btn" type="button" aria-label="뒤로 가기">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>전체 사업부</span>
        </button>
        <div class="team-title-wrap">
          <h2 id="team-title" class="team-title"></h2>
          <p id="team-title-en" class="team-title-en"></p>
        </div>
        <p id="team-count" class="team-count"></p>
      </div>
      <div id="cards" class="cards"></div>
    </section>
  </main>

  <footer class="site-footer">
    <p>ⓒ MIDAS IT · 2026 Global RPM Day</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
